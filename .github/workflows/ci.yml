name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-and-memory:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 27
        shell: bash
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -type d -name 'Xcode_27*.app' | sort | tail -1)"
          test -n "$XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
      - name: Check formatting
        run: xcrun swift-format lint --strict --recursive Package.swift Sources Tests
      - name: Build all test targets
        run: swift build --build-tests
      - name: Run default and memory tests
        run: swift test

  providers:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 27
        shell: bash
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -type d -name 'Xcode_27*.app' | sort | tail -1)"
          test -n "$XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
      - name: Test every provider trait
        run: swift test --traits AllProviders

  platform-builds:
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        destination:
          - generic/platform=iOS
          - generic/platform=visionOS
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 27
        shell: bash
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -type d -name 'Xcode_27*.app' | sort | tail -1)"
          test -n "$XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
      - name: Build package products
        run: >-
          xcodebuild build
          -scheme CoreAgent-Package
          -destination '${{ matrix.destination }}'
          CODE_SIGNING_ALLOWED=NO
